name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package and manifest versions
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -e 'const fs=require("fs"); const match=fs.readFileSync("src/manifest.ts", "utf8").match(/version: "([^"]+)"/); process.stdout.write(match?.[1] ?? "")')"
          if [[ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]]; then
            echo "package.json version '$PACKAGE_VERSION' does not match src/manifest.ts version '$MANIFEST_VERSION'." >&2
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Pack tarball
        run: pnpm pack --pack-destination .

      - name: Verify packaged plugin output
        shell: bash
        run: |
          set -euo pipefail
          TARBALL="$(ls -t ./*.tgz | head -n1)"
          CONTENTS_FILE="$(mktemp)"
          tar -tzf "$TARBALL" > "$CONTENTS_FILE"
          grep -q '^package/dist/worker.js$' "$CONTENTS_FILE"
          grep -q '^package/dist/manifest.js$' "$CONTENTS_FILE"
          grep -q '^package/dist/ui/index.js$' "$CONTENTS_FILE"
          grep -q '^package/package.json$' "$CONTENTS_FILE"
          grep -q '^package/pnpm-lock.yaml$' "$CONTENTS_FILE"
          rm -f "$CONTENTS_FILE"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-tarball
          path: ./*.tgz
          if-no-files-found: error
