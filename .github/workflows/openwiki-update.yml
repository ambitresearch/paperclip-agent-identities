name: OpenWiki Update

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: openwiki-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-openwiki:
    if: github.actor != 'github-actions[bot]'
    runs-on: [self-hosted]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Update OpenWiki
        run: openwiki --update --print
        env:
          OPENWIKI_PROVIDER: openai-compatible
          OPENAI_COMPATIBLE_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          OPENAI_COMPATIBLE_BASE_URL: ${{ vars.LITELLM_BASE_URL }}
          OPENWIKI_MODEL_ID: ${{ vars.OPENWIKI_MODEL_ID || 'gpt-5.5' }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGCHAIN_PROJECT: openwiki
          LANGCHAIN_TRACING_V2: ${{ secrets.LANGSMITH_API_KEY != '' && 'true' || 'false' }}

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            AGENTS.md
            openwiki
          branch: openwiki/update-${{ github.ref_name }}
          delete-branch: true
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update for `${{ github.ref_name }}`.

            This workflow runs on the self-hosted runner and uses the configured LiteLLM gateway via OpenWiki's OpenAI-compatible provider.
