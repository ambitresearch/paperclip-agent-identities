name: Plugin release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.2'
        required: true
        type: string
      prerelease:
        description: 'Mark GitHub Release as prerelease'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable pnpm
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Pack release asset
        id: pack
        run: |
          npm pack --json > pack.json
          ASSET_NAME="$(node -e "const p=require('./pack.json')[0]; process.stdout.write(p.filename);")"
          shasum -a 256 "$ASSET_NAME" > "$ASSET_NAME.sha256"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          notes="Built from ${GITHUB_REF_NAME} at ${GITHUB_SHA}."
          flags=()
          if [ "$PRERELEASE" = "true" ]; then flags+=(--prerelease); fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.pack.outputs.asset_name }}" "${{ steps.pack.outputs.asset_name }}.sha256" --clobber
          else
            gh release create "$TAG" "${{ steps.pack.outputs.asset_name }}" "${{ steps.pack.outputs.asset_name }}.sha256" \
              --title "$TAG" \
              --notes "$notes" \
              "${flags[@]}"
          fi
