name: Publish

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Publish with --dry-run only"
        required: true
        default: true
        type: boolean
      ref:
        description: "Immutable stable release tag to validate or publish, for example v0.1.4"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.ref || github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name != 'release' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - name: Resolve immutable release tag
        id: release
        env:
          EVENT_TAG: ${{ github.event.release.tag_name || '' }}
          INPUT_TAG: ${{ inputs.ref || '' }}
        run: |
          set -euo pipefail
          TAG="${EVENT_TAG:-$INPUT_TAG}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "A stable release tag such as v0.1.4 is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Verify tag and package version
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git rev-parse "refs/tags/${TAG}^{commit}" >/dev/null
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "v${VERSION}" != "$TAG" ]]; then
            echo "Tag '$TAG' does not match package.json version '$VERSION'." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Install and validate package
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Dry-run npm publish
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
