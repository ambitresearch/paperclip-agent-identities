name: Publish

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Publish with --dry-run only"
        required: true
        default: true
        type: boolean
      ref:
        description: "Immutable stable release tag to validate or publish, for example v0.1.4"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Validate release tag
        id: release
        env:
          TAG: ${{ inputs.ref }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "A stable release tag such as v0.1.4 is required." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Verify package and manifest versions
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          git rev-parse "refs/tags/${TAG}^{commit}" >/dev/null
          VERSION="$(node -p "require('./package.json').version")"
          MANIFEST_VERSION="$(node -e 'const fs=require("fs"); const match=fs.readFileSync("src/manifest.ts", "utf8").match(/version: "([^"]+)"/); process.stdout.write(match?.[1] ?? "")')"
          if [[ "v${VERSION}" != "$TAG" || "$MANIFEST_VERSION" != "$VERSION" ]]; then
            echo "Tag '${TAG}' does not match package and manifest version '${VERSION}'." >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Validate package
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Dry-run npm publish
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run --access public

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published."
            exit 0
          fi
          LATEST_VERSION="$(npm view "$PACKAGE_NAME" dist-tags.latest --registry=https://registry.npmjs.org 2>/dev/null || true)"
          DIST_TAG="$(node - "$LATEST_VERSION" "$VERSION" <<'NODE'
          const parse = (value) => {
            const match = value.match(/^(\d+)\.(\d+)\.(\d+)$/);
            if (!match) throw new Error(`Invalid stable version: ${value}`);
            return match.slice(1).map(Number);
          };
          const latest = process.argv[2];
          const current = parse(process.argv[3]);
          if (!latest) {
            process.stdout.write("latest");
            process.exit(0);
          }
          const previous = parse(latest);
          for (let index = 0; index < previous.length; index += 1) {
            if (current[index] > previous[index]) {
              process.stdout.write("latest");
              process.exit(0);
            }
            if (current[index] < previous[index]) {
              process.stdout.write("previous");
              process.exit(0);
            }
          }
          process.stdout.write("previous");
          NODE
          )"
          npm publish --access public --tag "$DIST_TAG"
