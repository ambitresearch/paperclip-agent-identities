name: Create Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out merged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Detect a version change
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version '$VERSION' must be a stable major.minor.patch version." >&2
            exit 1
          fi
          MANIFEST_VERSION="$(node -e 'const fs=require("fs"); const match=fs.readFileSync("src/manifest.ts", "utf8").match(/version: "([^"]+)"/); process.stdout.write(match?.[1] ?? "")')"
          if [[ "$MANIFEST_VERSION" != "$VERSION" ]]; then
            echo "src/manifest.ts version '$MANIFEST_VERSION' must match package.json version '$VERSION'." >&2
            exit 1
          fi
          PREVIOUS_VERSION=""
          if [[ ! "$BEFORE_SHA" =~ ^0+$ ]] && git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
            PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:package.json" | node -e 'const fs=require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(0, "utf8")).version || "")')"
          fi
          if [[ -n "$PREVIOUS_VERSION" && "$PREVIOUS_VERSION" == "$VERSION" ]]; then
            echo "Version unchanged at $VERSION; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate release package
        if: ${{ steps.version.outputs.should_release == 'true' }}
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm pack --pack-destination .

      - name: Tag the merged commit
        if: ${{ steps.version.outputs.should_release == 'true' }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          EXISTING_TAG_SHA="$(git ls-remote origin "refs/tags/${TAG}^{}" | awk 'NR == 1 { print $1 }')"
          if [[ -z "$EXISTING_TAG_SHA" ]]; then
            EXISTING_TAG_SHA="$(git ls-remote origin "refs/tags/${TAG}" | awk 'NR == 1 { print $1 }')"
          fi
          if [[ -n "$EXISTING_TAG_SHA" ]]; then
            if [[ "$EXISTING_TAG_SHA" != "$GITHUB_SHA" ]]; then
              echo "Existing tag '${TAG}' points to '${EXISTING_TAG_SHA}', not '${GITHUB_SHA}'." >&2
              exit 1
            fi
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$GITHUB_SHA" -m "Release $TAG"
          git push origin "refs/tags/${TAG}"

      - name: Create GitHub Release
        if: ${{ steps.version.outputs.should_release == 'true' }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
          fi

      - name: Dispatch npm publication
        if: ${{ steps.version.outputs.should_release == 'true' }}
        env:
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published."
            exit 0
          fi
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref main -f dry_run=false -f ref="$TAG"
