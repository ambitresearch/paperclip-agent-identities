name: Create Release

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main
  repository_dispatch:
    types:
      - finalize-release
  workflow_dispatch:
    inputs:
      bump:
        description: "Release increment. Patch is automatic on main; minor and major are manual only."
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: create-release-main
  cancel-in-progress: false

jobs:
  create-release:
    if: >-
      github.event_name != 'pull_request' &&
      github.event_name != 'repository_dispatch' &&
      (github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):'))
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Determine the next release version
        id: version
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const bump = process.env.BUMP;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const match = packageJson.version.match(/^(\d+)\.(\d+)\.(\d+)$/);
          if (!match) {
            throw new Error(`package.json version '${packageJson.version}' must be a stable major.minor.patch version`);
          }
          let [major, minor, patch] = match.slice(1).map(Number);
          if (bump === 'major') {
            major += 1; minor = 0; patch = 0;
          } else if (bump === 'minor') {
            minor += 1; patch = 0;
          } else if (bump === 'patch') {
            patch += 1;
          } else {
            throw new Error(`Unsupported release bump '${bump}'`);
          }
          const version = `${major}.${minor}.${patch}`;
          packageJson.version = version;
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);
          const manifestPath = 'src/manifest.ts';
          const manifest = fs.readFileSync(manifestPath, 'utf8');
          const updatedManifest = manifest.replace(/version: "[^"]+"/, `version: "${version}"`);
          if (updatedManifest === manifest) {
            throw new Error(`Unable to update the plugin manifest version in ${manifestPath}`);
          }
          fs.writeFileSync(manifestPath, updatedManifest);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\ntag=v${version}\nbranch=release/v${version}\n`);
          NODE

      - name: Update the lockfile for the release version
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Verify the release is new
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' already exists." >&2
            exit 1
          fi
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published to npm." >&2
            exit 1
          fi

      - name: Validate release build
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm pack --pack-destination .

      - name: Create or resume release pull request
        id: release-pr
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH: ${{ steps.version.outputs.branch }}
        run: |
          set -euo pipefail
          EXISTING_PR="$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head "$BRANCH" --state open --json number,url --jq '.[0] // empty')"
          if [[ -n "$EXISTING_PR" ]]; then
            PR_NUMBER="$(jq -r '.number' <<<"$EXISTING_PR")"
            PR_URL="$(jq -r '.url' <<<"$EXISTING_PR")"
            echo "Resuming release PR #${PR_NUMBER}."
            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
            gh workflow run plugin-ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
          else
            if git ls-remote --exit-code --heads origin "refs/heads/${BRANCH}" >/dev/null 2>&1; then
              git fetch origin "$BRANCH"
              git switch -C "$BRANCH" "origin/$BRANCH"
              BRANCH_VERSION="$(node -p "require('./package.json').version")"
              if [[ "$BRANCH_VERSION" != "$VERSION" ]]; then
                echo "Existing release branch '${BRANCH}' has version '${BRANCH_VERSION}', expected '${VERSION}'." >&2
                exit 1
              fi
            else
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git switch -c "$BRANCH"
              git add package.json pnpm-lock.yaml src/manifest.ts
              git commit -m "chore(release): v${VERSION}"
              git push origin "HEAD:refs/heads/${BRANCH}"
            fi
            PR_URL="$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "chore(release): v${VERSION}" \
              --body "Automated ${VERSION} release version bump. Copilot review and all PR checks must be clean before this PR merges.")"
            PR_NUMBER="$(gh pr view "$PR_URL" --repo "$GITHUB_REPOSITORY" --json number --jq .number)"
            gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
            gh workflow run plugin-ci.yml --repo "$GITHUB_REPOSITORY" --ref "$BRANCH"
          fi
          echo "number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Wait for automatic Copilot review and passing checks
        env:
          PR_NUMBER: ${{ steps.release-pr.outputs.number }}
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPOSITORY="${GITHUB_REPOSITORY#*/}"
          QUERY='query($owner:String!, $repo:String!, $number:Int!) { repository(owner:$owner, name:$repo) { pullRequest(number:$number) { state headRefOid reviews(last:100) { nodes { author { login } submittedAt commit { oid } } } reviewThreads(first:100) { nodes { isResolved } } } } }'
          for _ in $(seq 1 30); do
            REVIEW="$(gh api graphql -f owner="$OWNER" -f repo="$REPOSITORY" -F number="$PR_NUMBER" -f query="$QUERY")"
            STATE="$(jq -r '.data.repository.pullRequest.state' <<<"$REVIEW")"
            HEAD_OID="$(jq -r '.data.repository.pullRequest.headRefOid' <<<"$REVIEW")"
            COPILOT_REVIEWS="$(jq --arg head "$HEAD_OID" '[.data.repository.pullRequest.reviews.nodes[] | select(((.author.login // "") == "copilot-pull-request-reviewer" or (.author.login // "") == "copilot-pull-request-reviewer[bot]") and .submittedAt != null and (.commit.oid // "") == $head)] | length' <<<"$REVIEW")"
            OPEN_THREADS="$(jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved | not)] | length' <<<"$REVIEW")"
            CHECKS="$(gh pr checks "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json name,state,link 2>/dev/null)" || true
            CHECKS="${CHECKS:-[]}"
            CHECK_COUNT="$(jq 'length' <<<"$CHECKS")"
            SUCCESSFUL_CHECKS="$(jq '[.[] | select(.state == "SUCCESS")] | length' <<<"$CHECKS")"
            FAILED_CHECKS="$(jq '[.[] | select(.state == "FAILURE" or .state == "ERROR" or .state == "CANCELLED" or .state == "TIMED_OUT" or .state == "ACTION_REQUIRED")] | length' <<<"$CHECKS")"
            PENDING_CHECKS="$(jq '[.[] | select(.state != "SUCCESS" and .state != "SKIPPED" and .state != "NEUTRAL" and .state != "FAILURE" and .state != "ERROR" and .state != "CANCELLED" and .state != "TIMED_OUT" and .state != "ACTION_REQUIRED")] | length' <<<"$CHECKS")"
            if [[ "$STATE" != "OPEN" ]]; then
              echo "Release PR #${PR_NUMBER} is no longer open (state: ${STATE})." >&2
              exit 1
            fi
            if [[ "$FAILED_CHECKS" -gt 0 ]]; then
              echo "Release PR #${PR_NUMBER} has failing checks." >&2
              gh pr checks "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" || true
              exit 1
            fi
            if [[ "$COPILOT_REVIEWS" -gt 0 && "$OPEN_THREADS" -gt 0 ]]; then
              echo "Release PR #${PR_NUMBER} has ${OPEN_THREADS} unresolved review thread(s)." >&2
              exit 1
            fi
            if [[ "$COPILOT_REVIEWS" -gt 0 && "$OPEN_THREADS" -eq 0 && "$CHECK_COUNT" -gt 0 && "$SUCCESSFUL_CHECKS" -gt 0 && "$PENDING_CHECKS" -eq 0 ]]; then
              exit 0
            fi
            sleep 30
          done
          echo "Timed out waiting for automatic Copilot review and passing checks on release PR #${PR_NUMBER}." >&2
          exit 1

      - name: Merge the clean release pull request
        env:
          PR_NUMBER: ${{ steps.release-pr.outputs.number }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --squash \
            --delete-branch \
            --subject "chore(release): v${VERSION}" \
            --body "Automated release PR after a clean Copilot review and passing checks."

      - name: Dispatch release finalizer
        env:
          PR_NUMBER: ${{ steps.release-pr.outputs.number }}
          BRANCH: ${{ steps.version.outputs.branch }}
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          RELEASE_SHA="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json mergeCommit --jq '.mergeCommit.oid')"
          jq -n \
            --arg branch "$BRANCH" \
            --arg mergeCommit "$RELEASE_SHA" \
            --arg prNumber "$PR_NUMBER" \
            --arg version "$VERSION" \
            --arg tag "$TAG" \
            '{event_type:"finalize-release",client_payload:{branch:$branch,merge_commit:$mergeCommit,pr_number:$prNumber,version:$version,tag:$tag}}' \
            | gh api --method POST "repos/${GITHUB_REPOSITORY}/dispatches" --input -

  finalize-release:
    if: >-
      (github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')) ||
      (github.event_name == 'repository_dispatch' && github.event.action == 'finalize-release')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.pr_number || github.event.pull_request.number }}
      RELEASE_BRANCH: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.branch || github.event.pull_request.head.ref }}
      RELEASE_SHA: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.merge_commit || github.event.pull_request.merge_commit_sha }}
      EXPECTED_VERSION: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.version || '' }}
      EXPECTED_TAG: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.tag || '' }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Tag and publish the exact merged release commit
        run: |
          set -euo pipefail
          VERSION="${RELEASE_BRANCH#release/v}"
          TAG="v${VERSION}"
          if [[ ! "$RELEASE_BRANCH" =~ ^release/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unexpected release branch '${RELEASE_BRANCH}'." >&2
            exit 1
          fi
          if [[ -n "$EXPECTED_VERSION" && "$EXPECTED_VERSION" != "$VERSION" ]]; then
            echo "Release dispatch version '${EXPECTED_VERSION}' does not match '${VERSION}'." >&2
            exit 1
          fi
          if [[ -n "$EXPECTED_TAG" && "$EXPECTED_TAG" != "$TAG" ]]; then
            echo "Release dispatch tag '${EXPECTED_TAG}' does not match '${TAG}'." >&2
            exit 1
          fi
          PR_DATA="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state,headRefName,baseRefName,mergeCommit)"
          PR_STATE="$(jq -r '.state' <<<"$PR_DATA")"
          PR_HEAD="$(jq -r '.headRefName' <<<"$PR_DATA")"
          PR_BASE="$(jq -r '.baseRefName' <<<"$PR_DATA")"
          PR_MERGE_SHA="$(jq -r '.mergeCommit.oid // empty' <<<"$PR_DATA")"
          if [[ "$PR_STATE" != "MERGED" || "$PR_HEAD" != "$RELEASE_BRANCH" || "$PR_BASE" != "main" || "$PR_MERGE_SHA" != "$RELEASE_SHA" ]]; then
            echo "Finalizer payload does not match the merged release PR #${PR_NUMBER}." >&2
            exit 1
          fi
          gh auth setup-git
          git init --quiet release
          cd release
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags origin main "$RELEASE_SHA"
          if ! git merge-base --is-ancestor "$RELEASE_SHA" origin/main; then
            echo "Release commit '${RELEASE_SHA}' is not contained in main." >&2
            exit 1
          fi
          ACTUAL_VERSION="$(git show "${RELEASE_SHA}:package.json" | node -e 'const fs=require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(0, "utf8")).version)')"
          if [[ "$ACTUAL_VERSION" != "$VERSION" ]]; then
            echo "Release commit has version '${ACTUAL_VERSION}', expected '${VERSION}'." >&2
            exit 1
          fi
          EXISTING_TAG_SHA="$(git ls-remote origin "refs/tags/${TAG}^{}" | awk 'NR == 1 { print $1 }')"
          if [[ -n "$EXISTING_TAG_SHA" && "$EXISTING_TAG_SHA" != "$RELEASE_SHA" ]]; then
            echo "Existing tag '${TAG}' points to '${EXISTING_TAG_SHA}', not release commit '${RELEASE_SHA}'." >&2
            exit 1
          fi
          if [[ -z "$EXISTING_TAG_SHA" ]]; then
            git tag -a "$TAG" "$RELEASE_SHA" -m "Release v${VERSION}"
            if ! git push origin "refs/tags/${TAG}"; then
              EXISTING_TAG_SHA="$(git ls-remote origin "refs/tags/${TAG}^{}" | awk 'NR == 1 { print $1 }')"
              if [[ "$EXISTING_TAG_SHA" != "$RELEASE_SHA" ]]; then
                echo "Concurrent tag '${TAG}' does not point to release commit '${RELEASE_SHA}'." >&2
                exit 1
              fi
            fi
          fi
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --target "$RELEASE_SHA" --title "$TAG" --generate-notes
          fi
          PACKAGE_NAME="$(git show "${RELEASE_SHA}:package.json" | node -e 'const fs=require("fs"); process.stdout.write(JSON.parse(fs.readFileSync(0, "utf8")).name)')"
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published; no publish dispatch needed."
            exit 0
          fi
          gh workflow run publish.yml --repo "$GITHUB_REPOSITORY" --ref main -f dry_run=false -f ref="$TAG"
