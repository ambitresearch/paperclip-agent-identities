name: Create Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Release increment. Patch is automatic on main; minor and major are manual only."
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write

concurrency:
  group: create-release-main
  cancel-in-progress: false

jobs:
  create-release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.17.1 --activate

      - name: Determine the next release version
        id: version
        env:
          BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.bump || 'patch' }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const bump = process.env.BUMP;
          const packageJson = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const match = packageJson.version.match(/^(\d+)\.(\d+)\.(\d+)$/);
          if (!match) {
            throw new Error(`package.json version '${packageJson.version}' must be a stable major.minor.patch version`);
          }
          let [major, minor, patch] = match.slice(1).map(Number);
          if (bump === 'major') {
            major += 1; minor = 0; patch = 0;
          } else if (bump === 'minor') {
            minor += 1; patch = 0;
          } else if (bump === 'patch') {
            patch += 1;
          } else {
            throw new Error(`Unsupported release bump '${bump}'`);
          }
          const version = `${major}.${minor}.${patch}`;
          packageJson.version = version;
          fs.writeFileSync('package.json', `${JSON.stringify(packageJson, null, 2)}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\ntag=v${version}\n`);
          NODE

      - name: Update the lockfile for the release version
        run: pnpm install --lockfile-only --ignore-scripts

      - name: Verify the release is new
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' already exists." >&2
            exit 1
          fi
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} is already published to npm." >&2
            exit 1
          fi

      - name: Validate release build
        run: |
          pnpm install --frozen-lockfile
          pnpm typecheck
          pnpm test
          pnpm build
          pnpm pack --pack-destination .

      - name: Commit and tag the release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml
          git commit -m "chore(release): v${VERSION}"
          git tag -a "$TAG" -m "Release v${VERSION}"
          git push origin HEAD:main --follow-tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh release create "$TAG" --title "$TAG" --generate-notes

      - name: Dispatch npm publish
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: gh workflow run publish.yml --ref main -f dry_run=false -f ref="$TAG"
